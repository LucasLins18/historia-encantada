<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🐷 Os Três Porquinhos 🐷</title>

<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link rel="shortcut icon" href="favicon.ico">

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<header class="page-header">

    <a href="index.html" class="back-button">
        ← Voltar
    </a>

    <div class="page-title">
        <h1>🐷 Os Três Porquinhos 🐷</h1>
    </div>

</header>

<main class="container">

<section class="sounds-grid">

    <!-- CONSTRUÇÃO -->

    <div class="sound-card">

        <button 
        class="sound-button interactive-sound"
        data-audio="assets/sounds/tres-porquinhos/construção.mp3">
            🏠 Construção
        </button>

        <div class="sound-visualizer">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="volume-wrapper">

            <label>
                <span>Volume</span>
                <span class="volume-value">100%</span>
            </label>

            <input 
            type="range"
            class="volume-slider"
            min="0"
            max="1"
            step="0.01"
            value="1">

        </div>

    </div>


    <!-- VENTO -->

    <div class="sound-card">

        <button 
        class="sound-button interactive-sound"
        data-audio="assets/sounds/tres-porquinhos/vento.mp3">
            💨 Vento
        </button>

        <div class="sound-visualizer">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="volume-wrapper">

            <label>
                <span>Volume</span>
                <span class="volume-value">100%</span>
            </label>

            <input 
            type="range"
            class="volume-slider"
            min="0"
            max="1"
            step="0.01"
            value="1">

        </div>

    </div>


    <!-- LOBO -->

    <div class="sound-card">

        <button 
        class="sound-button interactive-sound"
        data-audio="assets/sounds/tres-porquinhos/porco.mp3">
            🐷 Porco
        </button>

        <div class="sound-visualizer">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="volume-wrapper">

            <label>
                <span>Volume</span>
                <span class="volume-value">100%</span>
            </label>

            <input 
            type="range"
            class="volume-slider"
            min="0"
            max="1"
            step="0.01"
            value="1">

        </div>

    </div>


    <!-- DEMOLIÇÃO -->

    <div class="sound-card">

        <button 
        class="sound-button interactive-sound"
        data-audio="assets/sounds/tres-porquinhos/demolição.mp3">
            💥 Demolição
        </button>

        <div class="sound-visualizer">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="volume-wrapper">

            <label>
                <span>Volume</span>
                <span class="volume-value">100%</span>
            </label>

            <input 
            type="range"
            class="volume-slider"
            min="0"
            max="1"
            step="0.01"
            value="1">

        </div>

    </div>

</section>

</main>

<script src="js/app.js"></script>

</body>
</html>
