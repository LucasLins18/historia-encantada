<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧺 Chapeuzinho Vermelho 🧺</title>

<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link rel="shortcut icon" href="favicon.ico">

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<header class="page-header">

    <a href="index.html" class="back-button">
        ← Voltar
    </a>

    <div class="page-title">
        <h1>🧺 Chapeuzinho Vermelho 🧺</h1>
    </div>

</header>

<main class="container">

<section class="sounds-grid">

    <!-- FLORESTA -->

    <div class="sound-card">

        <button 
        class="sound-button interactive-sound"
        data-audio="assets/sounds/chapeuzinho/floresta.mp3">
            🌲 Sons da Floresta
        </button>

        <div class="sound-visualizer">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="volume-wrapper">

            <label>
                <span>Volume</span>
                <span class="volume-value">100%</span>
            </label>

            <input 
            type="range"
            class="volume-slider"
            min="0"
            max="1"
            step="0.01"
            value="1">

        </div>

    </div>


    <!-- PASSOS -->

    <div class="sound-card">

        <button 
        class="sound-button interactive-sound"
        data-audio="assets/sounds/chapeuzinho/passos.mp3">
            👣 Passos
        </button>

        <div class="sound-visualizer">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="volume-wrapper">

            <label>
                <span>Volume</span>
                <span class="volume-value">100%</span>
            </label>

            <input 
            type="range"
            class="volume-slider"
            min="0"
            max="1"
            step="0.01"
            value="1">

        </div>

    </div>


    <!-- LOBO -->

    <div class="sound-card">

        <button 
        class="sound-button interactive-sound"
        data-audio="assets/sounds/chapeuzinho/lobo.mp3">
            🐺 Lobo
        </button>

        <div class="sound-visualizer">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="volume-wrapper">

            <label>
                <span>Volume</span>
                <span class="volume-value">100%</span>
            </label>

            <input 
            type="range"
            class="volume-slider"
            min="0"
            max="1"
            step="0.01"
            value="1">

        </div>

    </div>


    <!-- CHUVA -->

    <div class="sound-card">

        <button 
        class="sound-button interactive-sound"
        data-audio="assets/sounds/chapeuzinho/chuva.mp3">
            🌧️ Chuva
        </button>

        <div class="sound-visualizer">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="volume-wrapper">

            <label>
                <span>Volume</span>
                <span class="volume-value">100%</span>
            </label>

            <input 
            type="range"
            class="volume-slider"
            min="0"
            max="1"
            step="0.01"
            value="1">

        </div>

    </div>

</section>

</main>

<script src="js/app.js"></script>

</body>
</html>
